<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 自动发卡平台</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="brand">⚡ 极速<span>发卡</span> · 后台</div>
    <a href="/">返回商城</a>
    <a href="#" id="logoutBtn" style="display:none" onclick="logout();return false">退出登录</a>
  </nav>

  <!-- 登录 -->
  <div class="wrap" id="loginView" style="max-width:380px">
    <h1>后台登录</h1>
    <p class="sub">默认账号 admin / admin123(可用环境变量修改)</p>
    <label>账号</label>
    <input id="l-user" value="admin" />
    <label>密码</label>
    <input id="l-pass" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')login()" />
    <button style="margin-top:18px;width:100%" onclick="login()">登录</button>
  </div>

  <!-- 主面板 -->
  <div class="wrap" id="adminView" style="display:none">
    <div class="stats" id="stats"></div>

    <div class="tabs">
      <button class="btn-ghost" onclick="tab('orders')" id="t-orders">订单</button>
      <button class="btn-ghost" onclick="tab('products')" id="t-products">商品</button>
      <button class="btn-ghost" onclick="tab('cats')" id="t-cats">分类</button>
    </div>

    <div id="panel"></div>
  </div>

  <!-- 通用弹窗 -->
  <div class="modal-bg" id="modal">
    <div class="modal" id="modalBody"></div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/admin.js"></script>
</body>
</html>
