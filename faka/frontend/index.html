<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动发卡平台</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="brand">⚡ 极速<span>发卡</span></div>
    <a href="/" class="active">商城</a>
    <a href="/order">订单查询</a>
    <a href="/admin">后台</a>
  </nav>

  <div class="wrap">
    <h1>商品列表</h1>
    <p class="sub">下单付款后系统自动发货,卡密即时到账。</p>

    <div class="cats" id="cats"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- 下单弹窗 -->
  <div class="modal-bg" id="buyModal">
    <div class="modal">
      <h2 id="m-name"></h2>
      <p class="sub" id="m-desc"></p>
      <div class="row" style="display:flex;justify-content:space-between;align-items:center">
        <span class="price" id="m-price"></span>
        <span class="stock" id="m-stock"></span>
      </div>
      <label>购买数量</label>
      <input type="number" id="m-qty" value="1" min="1" />
      <label>联系邮箱(可选,用于找回订单)</label>
      <input type="email" id="m-contact" placeholder="you@example.com" />
      <div style="margin-top:14px;font-size:15px">
        应付金额:<span class="price" id="m-total"></span>
      </div>
      <div class="actions">
        <button class="btn-ghost" onclick="closeBuy()">取消</button>
        <button id="m-submit" onclick="submitOrder()">立即下单</button>
      </div>
    </div>
  </div>

  <!-- 支付/发货弹窗 -->
  <div class="modal-bg" id="payModal">
    <div class="modal">
      <h2 id="p-title">订单已创建</h2>
      <p class="sub">订单号:<b id="p-no"></b></p>
      <div id="p-pay">
        <p>应付金额:<span class="price" id="p-amount"></span></p>
        <p class="muted" style="font-size:13px">演示环境使用模拟支付;真实部署时此处替换为支付宝/微信支付二维码。</p>
        <div class="actions">
          <button class="btn-ghost" onclick="location.href='/order'">稍后支付</button>
          <button id="p-paybtn" onclick="doPay()">模拟支付</button>
        </div>
      </div>
      <div id="p-done" style="display:none">
        <p style="color:var(--ok)">✓ 支付成功,以下是你的卡密(请妥善保存):</p>
        <div class="card-box" id="p-cards"></div>
        <div class="actions">
          <button class="btn-ghost" onclick="copyCards()">复制卡密</button>
          <button onclick="location.reload()">完成</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/shop.js"></script>
</body>
</html>
